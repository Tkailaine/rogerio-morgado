<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    <link rel="shortcut icon" href="../favicon.ico" type="image/x-icon">
    <style>

      @charset "UTF-8";

      @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quicksand:wght@300..700&display=swap');

      @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap');


      :root{
        --cor1:#002447;
        --cor2:#001932;
        --cor3:#bfdfff;
        --cor4:#80c0ff;
        --cor5:#ffffff;

        --fonte-destaque: Quicksand, sans-serif;
        --fonte-normal: Poppins, sans-serif;
      }
            /* Estilo global */
      body {
          font-family: 'Roboto', sans-serif;
          background: #f4f4f4;
          color: #033b7a;
          margin: 0;
          padding-top: 80px;
      }

      header{
          width: 92%;
          margin-top: 20px;
          margin-left: 4%;
        }

      header.navbar {
        position: fixed;
        top: 0;
        background-image: linear-gradient(45deg, rgb(0, 162, 255) 0%, rgb(3, 41, 112) 90%);
        border-radius: 80px;
        color: rgb(255, 255, 255);
        z-index: 1000;
        transition: background-image 0.5s ease; /* Transição suave para o gradiente */
        
      }

      /* Quando o menu não estiver com fundo transparente */
      header.navbar.scrolled {
        background-image: linear-gradient(45deg, rgb(255, 255, 255) , rgb(229, 229, 231) ,  rgb(255, 255, 255) );
        background-size: 100% 100%; /* Preenche toda a área do menu com o gradiente */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        color: black;
      }

      /* Cor dos links quando o menu ganhar fundo */
      header.navbar.scrolled nav.menu ul li a {
        color: #ffffff; /* Cor quando o menu tem fundo */

      }

      header .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 20px;
        max-width: 1600px;
        margin: auto;
      }

      .logo{
      display: flex;
        gap: 10px;
        align-items: center;
      }

      .logo h1{
        font-size: 1.6em;
        font-weight: 300;
        margin: 0;
      }



      .logo img {
        width: 70px;

      }

      nav.menu .close-btn {
        display: block;
      }

      nav.menu {
        display: flex;
      }

      nav.menu ul {
        list-style: none;
        display: flex;
        gap: 50px;
      }

      nav.menu ul li a {
        text-decoration: none;
        color: white; /* Cor inicial dos links */
        font-size: 1rem;
        transition: color 0.3s ease;
        position: relative;
      }

      nav.menu ul li a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -5px;
        width: 0%;
        height: 2px;
        background: #ffffff;
        transition: width 0.3s ease;
      }

      nav.menu ul li a:hover::after {
        width: 100%;
      }

      nav.menu ul li a:hover {
        color: #ffffff;
      }

      /* Botão de menu (Hamburger) */
      .menu-toggle {
        display: none;
        flex-direction: column;
        gap: 5px;
        cursor: pointer;
        background: transparent;
        border: none;
      }

      .menu-toggle span {
        width: 25px;
        height: 3px;
        background: #ffffff;
        transition: all 0.3s ease;
      }

      /* Efeitos no botão */
      .menu-toggle.open span:nth-child(1) {
        transform: rotate(45deg) translate(5px, 5px);
      }

      .menu-toggle.open span:nth-child(2) {
        opacity: 0;
      }

      .menu-toggle.open span:nth-child(3) {
        transform: rotate(-45deg) translate(5px, -5px);
      }

      /* Botão de fechar no menu */
      nav.menu .close-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        color: #fff;
        font-size: 2rem;
        cursor: pointer;
        display: none;
        z-index: 1001;
      }
    .mobile-logo {
      display: none;
      position: absolute;
      top: 20%;
      left: 50%;
      z-index: 1002;
      transform: translate(-50%, -20%);
    }

.mobile-logo img {
  width: 170px;
  height: auto;
}


/* Responsividade */
@media (max-width: 768px) {

  .mobile-logo {
    display: block;
  }

  .menu-toggle {
    display: flex;
  }

  .logo h1{
        font-size: 1em;
       
      }

  nav.menu {
    position: fixed;
    top: 0;
    left: -100%;
    height: 100vh;
    width: 100%;
    background: rgba(5, 5, 5, 0.95);
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: all 0.5s ease;
  }

  nav.menu.active {
    left: 0;
  }

  nav.menu ul {
    flex-direction: column;
    gap: 20px;
    margin-top: 100px; 
  }

  nav.menu ul li {
    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 0.5s ease forwards;
    
  }
  

  nav.menu ul li:nth-child(1) {
    animation-delay: 0.3s;
  }

  nav.menu ul li:nth-child(2) {
    animation-delay: 0.5s;
  }

  nav.menu ul li:nth-child(3) {
    animation-delay: 0.7s;
  }

  nav.menu ul li:nth-child(4) {
    animation-delay: 0.9s;
  }

  /* Mostrar o botão de fechar no menu ativo */
  nav.menu .close-btn {
    display: block;
    top: 20px;
    right: 20px;
  }
}

/* Animação de fade-in */
@keyframes fadeIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.portal-destaque{
  padding: 5px;
  border: 2px solid;
  border-radius: 5px;
}

          border: 2px solid #ffffff;

        .container {
                  max-width: 1200px;

              }
              .blog {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 20px;
                  justify-content: center;
              }
              .card-blog {
                  width: 300px;
                  background: white;

              }
              .card-blog img {

              }
              .news-content {
                  padding: 15px;
              }
              .news-meta {
                  font-size: 12px;
                  color: #777;
              }
              .news-title {
                  font-size: 18px;
                  margin: 10px 0;
              }
              .news-summary {
                  font-size: 14px;
                  color: #555;
              }
              .news-link {
                  display: inline-block;
                  margin-top: 10px;
                  color: #08376d;
                  text-decoration: none;
                  font-weight: bold;
              }
              .news-link:hover {
                  text-decoration: underline;
              }
              @media (max-width: 768px) {
                  .blog {
                      flex-direction: column;
                      align-items: center;
                  }
              }
              a{
                text-decoration: none;
              }
              .branco, .subtitulo-branco{
                color: white;
              }

           
    </style>
</head>

      <button class="menu-toggle" id="menuToggle">

        <span class="line-menu" style="width: 20px; margin-left: 5px;"></span>

        <ul>

  </header>

<div class="container">
  <h1 style="text-align:center; margin-bottom:20px;">Todas as Notícias</h1>
  <div class="blog" id="newsContainer">
      <!-- Os cards serão adicionados aqui dinamicamente -->
  </div>
</div>
    

    <script>
      document.addEventListener("DOMContentLoaded", function () {
    console.log("JavaScript carregado com sucesso!");

    const menuToggle = document.getElementById("menuToggle");
    const menu = document.getElementById("menu");
    const closeMenu = document.getElementById("closeMenu");
    const menuLinks = document.querySelectorAll("#menu a");

    if (menuToggle && menu) {
        menuToggle.addEventListener("click", () => {
            console.log("Menu aberto");
            menu.classList.add("active");
        });
    } else {
        console.error("Erro: Elementos do menu não encontrados!");
    }

    if (closeMenu && menu) {
        closeMenu.addEventListener("click", () => {
            console.log("Menu fechado");
            menu.classList.remove("active");
        });
    }

    if (menuLinks.length > 0 && menu) {
        menuLinks.forEach(link => {
            link.addEventListener("click", () => {
                console.log("Menu fechado ao clicar em um link");
                menu.classList.remove("active");
            });
        });
    }





    // Evento de rolagem para verificar visibilidade (caso necessário)
    if (typeof checkVisibility === "function") {
        window.addEventListener("scroll", checkVisibility);
        checkVisibility(); // Executa assim que a página carregar
    } else {
        console.warn("Função checkVisibility não encontrada.");
    }

});

//cards
const newsData = [
            { img: "imagens/1.jpg", fonte: "Rogério Morgado", data: "02/05/2025", titulo: "Diferença entre acidente do trabalho e doença ocupacional", resumo: "Você sabe o que realmente diferencia um acidente de trabalho de uma doença ocupacional? Entenda os impactos legais .", link: "1.html" },
            { img: "imagens/2.jpg", fonte: "Rogério Morgado", data: "02/05/2025", titulo: "Acidente de percurso pode ou não ter direito a indenização", resumo: "Foi vítima de um acidente a caminho do trabalho? Nem sempre há direito à indenização, mas em muitos casos, sim. Descubra se você tem direito.", link: "2.html" },
            { img: "imagens/3.jpg", fonte: "Rogério Morgado", data: "02/05/2025", titulo: "Quem tem direito a estabilidade provisória?", resumo: "A estabilidade provisória é um direito pouco conhecido, mas pode fazer toda a diferença em momentos delicados.", link: "3.html" }
        ];

        // Ordena as notícias por data (mais recente primeiro)
        newsData.sort((a, b) => {
            const dateA = new Date(a.data.split("/").reverse().join("-"));
            const dateB = new Date(b.data.split("/").reverse().join("-"));
            return dateB - dateA;
        });

        const newsContainer = document.getElementById("newsContainer");

        newsData.forEach(news => {
            const card = document.createElement("div");
            card.classList.add("card-blog");
            card.innerHTML = `
                <img src="${news.img}" alt="${news.titulo}">
                <div class="news-content">
                    <p class="news-meta">Fonte: ${news.fonte} | Data: ${news.data}</p>
                    <h2 class="news-title">${news.titulo}</h2>
                    <p class="news-summary">${news.resumo}</p>
                    <a href="${news.link}" class="news-link">Leia mais</a>
                </div>
            `;
            newsContainer.appendChild(card);
        });
  
    </script>
